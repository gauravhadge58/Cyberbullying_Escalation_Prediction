version: '3.8'

services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-service:
    build: 
      context: ./ml-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml-service/saved_models:/app/saved_models

  backend:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cyberbullying_db
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - mongo
      - ml-service

  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000/api
      - VITE_WS_URL=ws://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
