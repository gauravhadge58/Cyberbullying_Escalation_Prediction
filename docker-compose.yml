version: '3.8'

services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build: 
      context: ./ml-service
    # ml-service: Expose port internally only for backend
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/model_cache
    volumes:
      - ./ml-service/saved_models:/app/saved_models
      - ml_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: 
      context: ./backend
    # backend: Expose port internally only for frontend proxy
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cyberbullying_db
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-/api}
        - VITE_WS_URL=${VITE_WS_URL:-/ws}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  ml_model_cache:
